<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <title>重量シュミレーション</title>
    <link rel="manifest" href="simulation.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-400 text-gray-800 antialiased">

<div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] flex items-center justify-center font-bold text-slate-600">
    <div class="flex flex-col items-center gap-2">
        <div class="w-8 h-8 border-4 border-lime-500 border-t-transparent rounded-full animate-spin"></div>
        読み込み中…
    </div>
</div>

<div class="max-w-3xl mx-auto px-4 flex flex-col">
    
   <div class="sticky top-0 z-40 bg-gray-400 pt-2 pb-2 flex flex-col gap-2">
        
        <header class="text-center pt-2">
            <h1 class="text-xl font-black title-shadow" style="color: rgb(161,193,44);">重量シュミレーション</h1>
            
            <div id="inline-confirm" class="max-w-md mx-auto overflow-hidden transition-all duration-300" style="max-height: 0px; opacity: 0;">
                <div class="mt-2 p-3 bg-slate-900 text-white rounded-2xl shadow-xl border border-slate-700 text-left">
                    <p class="text-[10px] font-bold mb-2">ホーム画面に追加しますか？</p>
                    <div class="flex gap-2">
                        <button onclick="handleInstallChoice(false)" class="flex-1 py-1 bg-slate-700 rounded-lg text-[10px]">今はしない</button>
                        <button onclick="handleInstallChoice(true)" class="flex-1 py-1 bg-lime-500 text-slate-900 rounded-lg text-[10px] font-black">追加</button>
                    </div>
                </div>
            </div>
            <p class="text-white/90 text-[10px] mt-1 title-shadow">機材を検索して、積載重量を確認できます。</p>
        </header>

        <div class="p-3 rounded-2xl shadow-lg gradient-border bg-white text-center">
            <div class="flex flex-col items-center gap-1 mb-1">
                <div class="text-[10px] font-black uppercase text-gray-400">Total 重量</div>
                <div class="text-4xl font-black italic text-slate-800 leading-none">
                    <span id="totalWeight">0.00</span><small class="text-lg ml-1 not-italic">t</small>
                </div>
            </div>
            <div class="relative w-2/3 h-6 mx-auto px-1">
                <div class="absolute top-0 left-0 w-full flex justify-between text-[8px] font-bold text-gray-400 px-1">
                    <span>0</span><span>10</span><span>20 t</span>
                </div>
                <div class="absolute bottom-0 left-0 w-full h-3 bg-gray-100 rounded-full border border-gray-200 shadow-inner">
                    <div id="weightMeter" class="h-full transition-all duration-700 ease-out" style="width:0%; background-color: #a1c12c;"></div>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-2 pb-1">
            <select id="categoryFilter" class="w-full px-4 py-3 rounded-2xl border-2 border-gray-100 bg-white text-gray-600 text-sm font-bold shadow-sm outline-none appearance-none cursor-pointer">
                <option value="">すべてのカテゴリ</option>
            </select>
            <div class="relative group">
                <input type="search" id="searchInput" placeholder="機材名・コードで検索..." autocomplete="off"
                       class="px-5 py-3 rounded-2xl w-full border-2 border-gray-100 focus:border-lime-500 outline-none shadow-sm text-sm font-medium"/>
                <div id="searchSuggestion" class="hidden absolute top-full left-0 w-full bg-white border-2 border-gray-100 rounded-xl shadow-2xl max-h-[250px] overflow-y-auto z-50 mt-1 p-1"></div>
            </div>
        </div>
    </div>
    <div id="selectedList" class="flex flex-col gap-2 pb-20 mt-2 min-h-[50vh]">
        <div class="text-center py-10 text-white/50 text-xs border-2 border-dashed border-white/20 rounded-2xl font-bold">
            機材が選択されていません
        </div>
    </div>
</div>

<div id="guide-overlay" onclick="closeGuide()" style="display:none; position:fixed; inset:0; background:rgba(15, 23, 42, 0.7); z-index:9999; backdrop-filter:blur(4px); opacity:0; transition: opacity 0.3s ease;"></div>
<div id="ios-guide" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -45%) scale(0.95); width:90%; max-width:360px; z-index:10000; opacity:0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none;">
  <div class="bg-white rounded-[30px] p-6 shadow-2xl relative text-center">
    <h3 class="text-lg font-black text-slate-800 mb-4">ホーム画面に追加</h3>
    <button onclick="closeGuide()" class="w-full py-3 bg-slate-900 text-white text-sm font-black rounded-xl">OK</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
