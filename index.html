<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <title>重量シュミレーション</title>
    <link rel="manifest" href="simulation.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-400 text-gray-800 antialiased">

<div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] flex items-center justify-center font-bold text-slate-600">
    <div class="flex flex-col items-center gap-2">
        <div class="w-8 h-8 border-4 border-lime-500 border-t-transparent rounded-full animate-spin"></div>
        読み込み中…
    </div>
</div>

<div class="max-w-3xl mx-auto p-4 flex flex-col gap-4">
    
   <header class="py-6 text-center">
    <h1 class="text-2xl font-black tracking-tight title-shadow" style="color: rgb(161,193,44);">重量シュミレーション</h1>
    
    <div id="inline-confirm" class="max-w-md mx-auto overflow-hidden transition-all duration-300 ease-in-out" style="max-height: 300px; opacity: 1;">
        <div class="mt-4 p-5 bg-slate-900 text-white rounded-3xl shadow-xl border border-slate-700 text-left">
            <div class="flex items-center gap-3 mb-4">
                <span class="text-2xl">📱</span>
                <p class="text-sm font-bold">ホーム画面に追加して、全画面で使いやすくしますか？</p>
            </div>
            <div class="flex gap-2">
                <button onclick="handleInstallChoice(false)" class="flex-1 py-2 bg-slate-700 rounded-xl text-xs font-bold active:scale-95 transition-all">今はしない</button>
                <button onclick="handleInstallChoice(true)" class="flex-1 py-2 bg-lime-500 text-slate-900 rounded-xl text-xs font-black active:scale-95 transition-all">追加する</button>
            </div>
        </div>
    </div>

    <p class="text-gray-400 text-xs mt-1">機材を検索して、積載重量を確認できます。</p>
</header>

    
    <div class="p-5 rounded-2xl shadow-lg text-center gradient-border relative bg-white overflow-hidden">
        <div class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1">Total 重量</div>
        <div class="text-5xl font-black mb-3 italic" style="color: rgb(30,41,59);">
            <span id="totalWeight">0.00</span><small class="text-xl ml-1 not-italic">t</small>
        </div>
        <div class="relative w-full h-12 mt-4 px-1">
            <div class="absolute top-0 left-0 w-full flex justify-between text-[10px] font-bold text-gray-400 px-1">
                <span>0</span><span>5</span><span>10</span><span>15</span><span>20 t</span>
            </div>
            <div class="absolute bottom-1 left-0 w-full h-7 bg-gray-100 rounded-full overflow-hidden border border-gray-200 shadow-inner">
                <div id="weightMeter" class="h-full transition-all duration-700 ease-out" style="width:0%; background-color: #a1c12c;"></div>
            </div>
            <div id="weightMarker" class="absolute bottom-8 w-0 h-0 border-l-[6px] border-r-[6px] border-b-[9px] border-l-transparent border-r-transparent border-b-slate-800 transition-all duration-700 ease-out shadow-sm"></div>
        </div>
    </div>

    <div class="flex flex-col gap-3 sticky top-2 z-40">
        <select id="categoryFilter" class="px-4 py-3 rounded-2xl w-full border-2 border-gray-100 bg-white text-gray-600 font-bold shadow-sm focus:border-lime-500 outline-none transition-all appearance-none cursor-pointer">
            <option value="">すべてのカテゴリ</option>
        </select>
        <div class="relative w-full group">
            <input type="search" id="searchInput" placeholder="機材名・コードで検索..." autocomplete="off"
                   class="px-5 py-4 rounded-2xl w-full border-2 border-gray-100 focus:border-lime-500 focus:ring-0 outline-none shadow-md transition-all text-base placeholder:text-gray-300 font-medium"/>
            <div id="searchSuggestion" class="hidden absolute top-full left-0 w-full bg-white border-2 border-gray-100 rounded-2xl shadow-2xl max-h-[350px] overflow-y-auto z-50 mt-2 p-1"></div>
        </div>
    </div>

    <div id="selectedList" class="flex flex-col gap-3 min-h-[40vh] pb-20 mt-2">
        <div class="text-center py-10 text-gray-300 font-medium border-2 border-dashed border-gray-100 rounded-2xl">
            機材が選択されていません
        </div>
    </div>
</div>

<div id="guide-overlay" onclick="closeGuide()" 
     style="display:none; position:fixed; inset:0; background:rgba(15, 23, 42, 0.7); z-index:9999; backdrop-filter:blur(4px); opacity:0; transition: opacity 0.3s ease;">
</div>

<div id="ios-guide" 
     style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -45%) scale(0.95); width:90%; max-width:360px; z-index:10000; opacity:0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none;">
  <div class="bg-white rounded-[40px] p-8 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] relative text-center border border-white/20">
    <button onclick="closeGuide()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-500 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
    </button>
    <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-50 rounded-full mb-6"><span class="text-4xl">📱</span></div>
    <h3 class="text-xl font-black text-slate-800 mb-8">ホーム画面に追加</h3>
    <div class="text-left space-y-4 mb-8">
      <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
        <div class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-black flex-shrink-0 shadow-md">1</div>
        <p class="text-[13px] text-slate-700 font-bold flex-1 leading-tight">下の<strong>「共有ボタン」</strong>をタップ</p>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
      </div>
      <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
        <div class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-black flex-shrink-0 shadow-md">2</div>
        <p class="text-[13px] text-slate-700 font-bold flex-1 leading-tight"><strong>「ホーム画面に追加」</strong>を選択</p>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line><rect x="2" y="2" width="20" height="20" rx="4" stroke-width="1.5"></rect></svg>
      </div>
    </div>
    <button onclick="closeGuide()" class="w-full py-4 bg-[#0f172a] text-white text-base font-black rounded-2xl active:scale-[0.95] transition-all shadow-lg shadow-slate-200">OK</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
